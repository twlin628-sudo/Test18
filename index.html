<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 英文單字學習</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #1a1a2e;
    --ink2:   #44445a;
    --ink3:   #8888a4;
    --paper:  #f5f4f0;
    --card:   #ffffff;
    --accent: #4f46e5;
    --accent-light: #ede9fe;
    --green:  #16a34a;
    --green-light: #dcfce7;
    --red:    #dc2626;
    --red-light: #fee2e2;
    --border: #e4e2ec;
    --shadow: 0 2px 12px rgba(79,70,229,.10);
    --radius: 14px;
  }

  body {
    font-family: "Georgia", "Noto Serif TC", serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: #fff;
    padding: 18px 24px 14px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .02em; }
  header .model-badge {
    font-family: "SF Mono", "Fira Mono", monospace;
    font-size: .72rem;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 20px;
    padding: 2px 10px;
    color: rgba(255,255,255,.75);
    cursor: pointer;
    transition: background .15s;
  }
  header .model-badge:hover { background: rgba(255,255,255,.2); }

  /* ── Main layout ── */
  main {
    max-width: 620px;
    margin: 0 auto;
    padding: 28px 16px 0;
  }

  /* ── Card ── */
  .word-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px 28px 24px;
    min-height: 340px;
    position: relative;
    transition: opacity .25s;
  }
  .word-card.loading { opacity: .45; pointer-events: none; }

  .word-card .tag {
    font-family: "SF Mono","Fira Mono",monospace;
    font-size: .7rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-light);
    border-radius: 20px;
    padding: 3px 10px;
    display: inline-block;
    margin-bottom: 14px;
  }

  .word-card .en-word {
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: -.01em;
    line-height: 1.1;
    color: var(--ink);
  }

  .word-card .phonetic {
    font-family: "SF Mono","Fira Mono",monospace;
    font-size: .9rem;
    color: var(--ink3);
    margin: 6px 0 4px;
  }

  .word-card .pos {
    font-size: .8rem;
    color: var(--ink3);
    font-style: italic;
    margin-bottom: 20px;
  }

  .word-card .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 18px;
  }

  .word-card .zh-meaning {
    font-size: 1.25rem;
    color: var(--ink);
    margin-bottom: 18px;
    font-weight: 500;
  }

  .section-label {
    font-family: "SF Mono","Fira Mono",monospace;
    font-size: .68rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 6px;
  }

  .word-card .sentence-en {
    font-size: 1rem;
    line-height: 1.65;
    color: var(--ink2);
    margin-bottom: 8px;
  }
  .word-card .sentence-zh {
    font-size: .9rem;
    color: var(--ink3);
    line-height: 1.6;
  }

  /* keyword highlight */
  .word-card .kw {
    color: var(--accent);
    font-weight: 600;
  }

  /* ── Empty / placeholder state ── */
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-height: 280px;
    color: var(--ink3);
    text-align: center;
  }
  .placeholder .big-icon { font-size: 3rem; }
  .placeholder p { font-size: .95rem; }

  /* ── Spinner ── */
  .spinner-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s;
  }
  .word-card.loading .spinner-wrap { opacity: 1; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Action bar ── */
  .action-bar {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: "Georgia", serif;
    font-size: .9rem;
    border: none;
    border-radius: 10px;
    padding: 11px 20px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    line-height: 1;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: default; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    flex: 1;
    font-weight: 700;
    font-size: 1rem;
  }
  .btn-primary:hover:not(:disabled) { opacity: .88; }

  .btn-know {
    background: var(--green-light);
    color: var(--green);
    font-weight: 600;
  }
  .btn-know:hover:not(:disabled) { background: #bbf7d0; }

  .btn-again {
    background: var(--red-light);
    color: var(--red);
    font-weight: 600;
  }
  .btn-again:hover:not(:disabled) { background: #fecaca; }

  /* ── Review bar ── */
  .review-bar {
    display: none;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .review-bar.show { display: flex; }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 20px;
    margin-top: 22px;
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .stat-item { text-align: center; flex: 1; }
  .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--ink); }
  .stat-label { font-size: .72rem; color: var(--ink3); margin-top: 2px; font-family: "SF Mono","Fira Mono",monospace; letter-spacing: .05em; }
  .stat-item.known .stat-num { color: var(--green); }
  .stat-item.review-again .stat-num { color: var(--red); }

  /* ── History ── */
  .history-title {
    font-size: .72rem;
    font-family: "SF Mono","Fira Mono",monospace;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin: 28px 0 10px;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: .9rem;
  }
  .history-item .h-word { font-weight: 700; color: var(--ink); min-width: 130px; }
  .history-item .h-zh  { color: var(--ink3); flex: 1; font-size: .85rem; }
  .history-item .h-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .h-dot.known  { background: var(--green); }
  .h-dot.again  { background: var(--red); }
  .h-dot.unseen { background: var(--border); }

  /* ── Model picker modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.35);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px 22px;
    width: 300px;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
  }
  .modal h2 { font-size: 1rem; margin-bottom: 14px; }
  .modal select {
    width: 100%; padding: 9px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: .95rem; margin-bottom: 14px;
    font-family: "SF Mono","Fira Mono",monospace; background: var(--paper);
  }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions .btn { flex: 1; padding: 9px; font-size: .9rem; }
  .btn-cancel { background: var(--paper); color: var(--ink2); border: 1px solid var(--border); }

  /* ── Error toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1f1f2e; color: #fff;
    padding: 12px 20px; border-radius: 10px;
    font-size: .88rem; max-width: 360px; text-align: center;
    transition: transform .3s, opacity .3s;
    opacity: 0; pointer-events: none; z-index: 200;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Level select ── */
  .level-row {
    display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap;
  }
  .level-btn {
    font-size: .78rem; padding: 5px 14px;
    border: 1px solid var(--border); border-radius: 20px;
    background: var(--card); color: var(--ink3); cursor: pointer;
    font-family: "SF Mono","Fira Mono",monospace;
    transition: all .15s;
  }
  .level-btn.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>📚 AI 英文單字</h1>
  <span class="model-badge" id="model-badge" onclick="openModal()">gemma4:e4b ▾</span>
</header>

<main>
  <!-- Level selector -->
  <div class="level-row" id="level-row">
    <button class="level-btn active" onclick="setLevel('高中',this)">高中</button>
    <button class="level-btn" onclick="setLevel('大學',this)">大學</button>
    <button class="level-btn" onclick="setLevel('GRE',this)">GRE</button>
    <button class="level-btn" onclick="setLevel('商業英文',this)">商業</button>
    <button class="level-btn" onclick="setLevel('日常口語',this)">口語</button>
  </div>

  <!-- Word card -->
  <div class="word-card" id="word-card">
    <div class="spinner-wrap"><div class="spinner"></div></div>
    <div id="card-content">
      <div class="placeholder">
        <div class="big-icon">✦</div>
        <p>按下「下一個單字」<br>讓 AI 給你出題</p>
      </div>
    </div>
  </div>

  <!-- Main CTA -->
  <div class="action-bar">
    <button class="btn btn-primary" id="next-btn" onclick="fetchWord()">下一個單字 →</button>
  </div>

  <!-- Know / Again buttons (shown after card loads) -->
  <div class="review-bar" id="review-bar">
    <button class="btn btn-again" onclick="markWord('again')">✗ 再複習</button>
    <button class="btn btn-know"  onclick="markWord('known')">✓ 已記住</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">已出現</div>
    </div>
    <div class="stat-item known">
      <div class="stat-num" id="stat-known">0</div>
      <div class="stat-label">記住了</div>
    </div>
    <div class="stat-item review-again">
      <div class="stat-num" id="stat-again">0</div>
      <div class="stat-label">待複習</div>
    </div>
  </div>

  <!-- History -->
  <div class="history-title" id="history-title" style="display:none">— 本次紀錄 —</div>
  <div class="history-list" id="history-list"></div>
</main>

<!-- Model modal -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>選擇模型</h2>
    <select id="model-select">
      <option value="gemma4:e4b">gemma4:e4b（快速）</option>
      <option value="qwen3.5:9b">qwen3.5:9b</option>
      <option value="gemma4:26b">gemma4:26b（精確）</option>
      <option value="qwen3.6:27b">qwen3.6:27b</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="applyModel()">確定</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const BASE  = "https://spring-art-db47.twlin628.workers.dev";
let model   = localStorage.getItem("vocab_model") || "gemma4:e4b";
let level   = "高中";
let history = [];       // { word, phonetic, pos, zh, sentEn, sentZh, status }
let statTotal = 0, statKnown = 0, statAgain = 0;
let currentWord = null;
let busy = false;

// ── Restore model ──
document.getElementById("model-badge").textContent = model + " ▾";
document.getElementById("model-select").value = model;

// ── Level ──
function setLevel(l, btn) {
  level = l;
  document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// ── Fetch word from AI ──
async function fetchWord() {
  if (busy) return;
  busy = true;

  const card = document.getElementById("word-card");
  const nextBtn = document.getElementById("next-btn");
  card.classList.add("loading");
  nextBtn.disabled = true;
  document.getElementById("review-bar").classList.remove("show");

  // Build history context to avoid repeats
  const seenWords = history.map(h => h.word).slice(-30).join(", ");
  const avoidLine = seenWords ? `\n避免重複這些已出現的單字：${seenWords}` : "";

  const prompt = `你是英文單字老師。請給我一個「${level}」程度的英文單字（隨機選取，每次都要不同）。
輸出格式請嚴格遵守以下 JSON，不要輸出其他任何文字：
{
  "word": "英文單字",
  "phonetic": "KK音標或IPA",
  "pos": "詞性（如 n. / v. / adj. / adv.）",
  "zh_meaning": "中文意思（簡潔，2-6字）",
  "sentence_en": "一句實用的英文例句（含該單字，難度符合${level}程度）",
  "sentence_zh": "上句例句的中文翻譯"
}${avoidLine}`;

  try {
    const res = await fetch(BASE + "/api/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model,
        messages: [{ role: "user", content: prompt }],
        stream: false,
      }),
    });

    if (!res.ok) {
      const t = await res.text();
      throw new Error(`HTTP ${res.status}: ${t.slice(0, 120)}`);
    }

    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content ?? "";

    // Fault-tolerant JSON parse
    const jsonMatch = raw.match(/\{[\s\S]*?\}/);
    if (!jsonMatch) throw new Error("AI 回應格式錯誤，請再試一次。");
    const parsed = JSON.parse(jsonMatch[0]);

    const { word, phonetic, pos, zh_meaning, sentence_en, sentence_zh } = parsed;
    if (!word || !sentence_en) throw new Error("AI 回應欄位不完整，請再試一次。");

    currentWord = { word, phonetic, pos, zh_meaning, sentence_en, sentence_zh, status: "unseen" };
    statTotal++;
    updateStats();
    renderCard(currentWord);
    document.getElementById("review-bar").classList.add("show");

  } catch (e) {
    showToast("⚠ " + e.message);
    renderPlaceholder();
  } finally {
    card.classList.remove("loading");
    nextBtn.disabled = false;
    busy = false;
  }
}

// ── Render card ──
function renderCard(w) {
  // Highlight the word in the sentence (case-insensitive)
  const re = new RegExp(`\\b(${escapeRe(w.word)}(?:s|ed|ing|er|est|ly)?)\\b`, "gi");
  const highlightedSentEn = w.sentence_en.replace(re, '<span class="kw">$1</span>');

  document.getElementById("card-content").innerHTML = `
    <div class="tag">${level} · ${w.pos || "n/a"}</div>
    <div class="en-word">${w.word}</div>
    <div class="phonetic">${w.phonetic || ""}</div>
    <hr class="divider">
    <div class="zh-meaning">${w.zh_meaning}</div>
    <div class="section-label">例句</div>
    <div class="sentence-en">${highlightedSentEn}</div>
    <div class="sentence-zh">${w.sentence_zh || ""}</div>
  `;
}

function renderPlaceholder() {
  document.getElementById("card-content").innerHTML = `
    <div class="placeholder">
      <div class="big-icon">↺</div>
      <p>出了點問題，請再按一次</p>
    </div>`;
}

// ── Mark word ──
function markWord(status) {
  if (!currentWord) return;
  currentWord.status = status;
  if (status === "known") statKnown++;
  else statAgain++;
  updateStats();
  addToHistory(currentWord);
  document.getElementById("review-bar").classList.remove("show");
  currentWord = null;
}

// ── Stats ──
function updateStats() {
  document.getElementById("stat-total").textContent = statTotal;
  document.getElementById("stat-known").textContent = statKnown;
  document.getElementById("stat-again").textContent = statAgain;
}

// ── History ──
function addToHistory(w) {
  history.unshift(w);
  const title = document.getElementById("history-title");
  title.style.display = "block";
  const list = document.getElementById("history-list");
  const item = document.createElement("div");
  item.className = "history-item";
  item.innerHTML = `
    <div class="h-dot ${w.status}"></div>
    <div class="h-word">${w.word}</div>
    <div class="h-zh">${w.zh_meaning}</div>
  `;
  list.prepend(item);
}

// ── Model modal ──
function openModal() {
  document.getElementById("model-select").value = model;
  document.getElementById("overlay").classList.add("show");
}
function closeModal() { document.getElementById("overlay").classList.remove("show"); }
function closeModalOutside(e) { if (e.target === document.getElementById("overlay")) closeModal(); }
function applyModel() {
  model = document.getElementById("model-select").value;
  localStorage.setItem("vocab_model", model);
  document.getElementById("model-badge").textContent = model + " ▾";
  closeModal();
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

// ── Util ──
function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
</script>
</body>
</html>
